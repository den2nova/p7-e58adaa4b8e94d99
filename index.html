<!doctype html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f38aa8"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="単価メモ"><meta name="description" content="通信なしでも使える、かわいい単価比較メモ"><meta name="robots" content="noindex, nofollow, noarchive, nosnippet"><meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet"><link rel="manifest" href="./manifest.webmanifest"><link rel="apple-touch-icon" href="./icons/apple-touch-icon.png"><link rel="stylesheet" href="./style.css"><title>おかいもの単価メモ</title></head><body><div class="app-shell"><header class="hero"><div class="hero__icon" aria-hidden="true">🛒</div><div><p class="eyebrow">PRICE COMPARE</p><h1 id="app-title">おかいもの単価メモ</h1><p class="subtitle">どっちがお得か、すぐ計算！</p></div></header><main><section class="unit-panel" aria-labelledby="unit-title"><div><p class="section-kicker">STEP 1</p><h2 id="unit-title">くらべる単位</h2></div><div id="unit-switcher" class="unit-switcher" role="radiogroup" aria-label="くらべる単位"><button class="unit-button" type="button" role="radio" data-unit="g">g</button> <button class="unit-button" type="button" role="radio" data-unit="ml">ml</button> <button class="unit-button" type="button" role="radio" data-unit="L">L</button> <button class="unit-button" type="button" role="radio" data-unit="個">個</button></div></section><div class="section-heading"><div><p class="section-kicker">STEP 2</p><h2>価格と内容量</h2></div><span id="item-count" class="count-pill">2 / 5</span></div><section id="product-list" class="product-grid" aria-label="商品入力"></section><div class="compact-actions"><button id="add-button" class="text-button text-button--add" type="button">＋ 商品を追加</button> <button id="clear-button" class="text-button" type="button">すべてクリア</button></div><section id="comparison" class="comparison" aria-labelledby="comparison-title" aria-live="polite"><div class="comparison__heading"><div><p class="section-kicker">RESULT</p><h2 id="comparison-title">比較結果</h2></div><span id="result-unit" class="result-unit">1gあたり</span></div><div id="result-list" class="result-list"></div><div id="winner-summary" class="winner-summary"><span aria-hidden="true">✦</span><p>2つ以上入力すると、お得度がわかります</p></div></section><p class="offline-note"><span aria-hidden="true">✓</span> 入力は自動保存・通信なしでも使えます</p></main></div><template id="product-template"><article class="product-card"><div class="card-topline"><span class="product-letter"></span> <label class="name-wrap"><span class="sr-only">商品名</span> <input class="name-input" maxlength="30" placeholder="商品名（任意）" autocomplete="off"></label> <button class="delete-button" type="button" aria-label="商品を削除">×</button></div><div class="input-pair"><label class="compact-field"><span>価格</span> <span class="input-box"><span aria-hidden="true">¥</span><input class="price-input" inputmode="decimal" placeholder="398" autocomplete="off"></span></label> <label class="compact-field"><span>内容量</span> <span class="input-box"><input class="quantity-input" inputmode="decimal" placeholder="350" autocomplete="off"><b class="unit-suffix">g</b></span></label></div></article></template><dialog id="clear-dialog" aria-labelledby="dialog-title"><div class="dialog-icon" aria-hidden="true">🧹</div><h2 id="dialog-title">入力した内容を全部消しますか？</h2><p>商品も最初の2件に戻ります。</p><div class="dialog-actions"><button id="cancel-clear" class="button button--secondary" type="button">やめる</button> <button id="confirm-clear" class="button button--danger" type="button">消す</button></div></dialog><script type="module" src="./app.js"></script></body></html>
